<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Meow Chat 🐾</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #ffe4e1;
            --header-bg: #ffb6c1;
            --header-border: #ff69b4;
            --chat-bg: url('https://www.transparenttextures.com/patterns/cats.png');
            --chat-bg-color: transparent;
            --my-msg-bg: #ff69b4;
            --other-msg-bg: white;
            --other-msg-border: #ffb6c1;
            --other-msg-text: #ff69b4;
            --input-area-bg: #fff5f7;
            --input-bg: white;
            --text-color: black;
        }

        body.dark-theme {
            --bg-color: #121212;
            --header-bg: #1e1e1e;
            --header-border: #ff69b4;
            --chat-bg: none;
            --chat-bg-color: #1a1a1a;
            --my-msg-bg: #d84b91;
            --other-msg-bg: #2d2d2d;
            --other-msg-border: #444;
            --other-msg-text: #ffb6c1;
            --input-area-bg: #1e1e1e;
            --input-bg: #333;
            --text-color: white;
        }

        html, body { 
            height: 100%; height: 100dvh; margin: 0; padding: 0; overflow: hidden; 
            display: flex; flex-direction: column; 
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Comic Sans MS', 'Quicksand', sans-serif; 
        }

        #login-screen, #chat-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
        #chat-screen { display: none; justify-content: flex-start; }
        
        .header { flex-shrink: 0; background-color: var(--header-bg); width: 100%; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; color: white; border-bottom: 3px solid var(--header-border); box-sizing: border-box; z-index: 10;}
        .header-btns { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; }
        
        .chat-box { flex-grow: 1; width: 100%; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; background-image: var(--chat-bg); background-color: var(--chat-bg-color); box-sizing: border-box; scroll-behavior: smooth;} 
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; margin-bottom: 12px; }
        .my-wrapper { align-self: flex-end; align-items: flex-end; }
        .other-wrapper { align-self: flex-start; align-items: flex-start; }
        
        .sender-name { font-size: 11px; color: var(--other-msg-text); margin-bottom: 3px; font-weight: bold; text-transform: capitalize;}
        .msg-bubble { padding: 10px 15px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
        .my-msg { background-color: var(--my-msg-bg); color: white; border-bottom-right-radius: 4px; }
        .other-msg { background-color: var(--other-msg-bg); color: var(--other-msg-text); border: 1.5px solid var(--other-msg-border); border-bottom-left-radius: 4px; }
        
        .msg-info { font-size: 10px; color: #a9a9a9; margin-top: 3px; display: flex; gap: 8px; align-items: center;}
        .seen-text { color: #ff69b4; font-weight: bold; font-size: 9px;}

        .input-area { flex-shrink: 0; display: flex; width: 100%; padding: 10px; background: var(--input-area-bg); border-top: 2px solid var(--header-border); box-sizing: border-box; align-items: center; padding-bottom: env(safe-area-inset-bottom, 10px);}
        input { flex: 1; padding: 12px 15px; border: 2px solid var(--header-border); border-radius: 25px; outline: none; font-size: 15px; background: var(--input-bg); color: var(--text-color);}
        button.send-btn { background-color: #ff69b4; color: white; border: none; padding: 12px 18px; margin-left: 8px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 15px;}
        
        .login-box { background: var(--input-bg); padding: 35px 25px; border-radius: 25px; text-align: center; border: 3px solid var(--header-border); width: 85%; max-width: 320px; box-sizing: border-box;}
        .login-box input { display: block; width: 100%; margin: 12px 0; padding: 14px; box-sizing: border-box; font-size: 14px;}
        .login-box button { width: 100%; padding: 12px; border-radius: 20px; border: none; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer;}
        #login-btn { background-color: #ff69b4; color: white; }
        #signup-btn { background-color: #ffc0cb; color: #d84b91; margin-top: 15px;}
    </style>
</head>
<body>

<audio id="notify-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: #ff69b4; margin-top: 0; font-size: 26px;">🐾 Meow Chat App</h2>
        <input type="text" id="username" placeholder="Username (eg: Rifat)">
        <input type="password" id="password" placeholder="Password (min 6 char)">
        <button id="login-btn">Login</button>
        <button id="signup-btn">Sign Up</button>
        <p style="font-size: 12px; color: gray; margin-top: 15px;">Login korar por Notification allow korben</p>
    </div>
</div>

<div id="chat-screen">
    <div class="header">
        <button id="theme-btn" class="header-btns">🌙</button>
        <span>🐱 Meow Chat 🐾</span>
        <button id="logout-btn" class="header-btns">🚪</button>
    </div>
    <div class="chat-box" id="messages"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" id="send-btn">Send</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCrFso8vwiQSZgBKEcXsKfpubj34LCMVXw",
    authDomain: "meowchat-b6f99.firebaseapp.com",
    projectId: "meowchat-b6f99",
    storageBucket: "meowchat-b6f99.firebasestorage.app",
    messagingSenderId: "62260339507",
    appId: "1:62260339507:web:161d70d04f42ef1dd31446"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  
  // Messaging Initialization
  let messaging;
  try {
      messaging = getMessaging(app);
  } catch (e) {
      console.log("Messaging error:", e);
  }

  const loginScreen = document.getElementById('login-screen');
  const chatScreen = document.getElementById('chat-screen');
  const messagesDiv = document.getElementById('messages');
  const msgInput = document.getElementById('msg-input');

  // Theme
  const themeBtn = document.getElementById('theme-btn');
  let isDark = false;
  themeBtn.addEventListener('click', () => {
      isDark = !isDark;
      document.body.classList.toggle('dark-theme', isDark);
      themeBtn.innerText = isDark ? '☀️' : '🌙';
  });

  // Logout
  document.getElementById('logout-btn').addEventListener('click', () => {
      signOut(auth).then(() => { messagesDiv.innerHTML = ''; }).catch(e => alert(e.message));
  });

  function extractUsername(email) {
      if(!email) return "Someone";
      return email.split('@')[0];
  }
  function getFakeEmail() {
      const uname = document.getElementById('username').value.trim().toLowerCase();
      if(!uname) return "";
      return uname + "@catchat.com";
  }

  // Push Notification Permission Request
  function requestNotificationPermission() {
      if ('Notification' in window) {
          Notification.requestPermission().then((permission) => {
              if (permission === 'granted') {
                  console.log('Notification permission granted.');
              }
          });
      }
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
      const email = getFakeEmail();
      const pass = document.getElementById('password').value;
      if(!email || !pass) return alert("Username ar Password dao!");
      try { 
          await signInWithEmailAndPassword(auth, email, pass); 
          requestNotificationPermission(); // Ask for notification on login
      } catch(error) { alert("Login fail! Check credentials."); }
  });
  
  document.getElementById('signup-btn').addEventListener('click', async () => {
      const email = getFakeEmail();
      const pass = document.getElementById('password').value;
      if(!email || !pass) return alert("Username ar Password dao!");
      if(pass.length < 6) return alert("Password kompokkhe 6 character lagbe!");
      try {
          await createUserWithEmailAndPassword(auth, email, pass);
          alert("Account toiri hoyeche! Welcome 🐾");
          requestNotificationPermission();
      } catch(error) { alert("Signup fail: " + error.message); }
  });

  let currentUser = null;
  let currentUname = "";
  let unsubscribeSnapshot = null;
  let isInitialLoad = true;

  onAuthStateChanged(auth, (user) => {
      if (user) {
          currentUser = user;
          currentUname = extractUsername(user.email);
          loginScreen.style.display = 'none';
          chatScreen.style.display = 'flex';
          loadMessages();
          setTimeout(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; }, 300);
      } else {
          currentUser = null;
          loginScreen.style.display = 'flex';
          chatScreen.style.display = 'none';
          if(unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
      }
  });

  function loadMessages() {
      if(unsubscribeSnapshot) unsubscribeSnapshot();
      isInitialLoad = true;
      messagesDiv.innerHTML = '';

      const q = query(collection(db, "chats"), orderBy("timestamp"));
      
      unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
          messagesDiv.innerHTML = '';
          
          snapshot.forEach((documentSnapshot) => {
              const msgData = documentSnapshot.data();
              const docId = documentSnapshot.id;
              const isMyMsg = msgData.uid === currentUser.uid;
              const senderName = extractUsername(msgData.senderEmail);
              
              let timeString = "...";
              if (msgData.timestamp) {
                  const date = msgData.timestamp.toDate();
                  timeString = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
              }

              if (!isMyMsg && !msgData.seen) {
                  const docRef = doc(db, "chats", docId);
                  updateDoc(docRef, { seen: true, seenBy: currentUname }).catch(e=>console.log(e));
              }

              const wrapperEl = document.createElement('div');
              wrapperEl.classList.add('msg-wrapper');
              wrapperEl.classList.add(isMyMsg ? 'my-wrapper' : 'other-wrapper');

              const nameEl = document.createElement('div');
              nameEl.classList.add('sender-name');
              nameEl.innerText = isMyMsg ? "Me" : senderName;
              
              const bubbleEl = document.createElement('div');
              bubbleEl.classList.add('msg-bubble');
              bubbleEl.classList.add(isMyMsg ? 'my-msg' : 'other-msg');
              bubbleEl.innerText = msgData.text;

              const infoEl = document.createElement('div');
              infoEl.classList.add('msg-info');
              
              let infoHtml = `<span>${timeString}</span>`;
              if (isMyMsg && msgData.seen) {
                  infoHtml += `<span class="seen-text">👀 Seen</span>`;
              }
              infoEl.innerHTML = infoHtml;

              wrapperEl.appendChild(nameEl);
              wrapperEl.appendChild(bubbleEl);
              wrapperEl.appendChild(infoEl);

              messagesDiv.appendChild(wrapperEl);
          });
          
          messagesDiv.scrollTop = messagesDiv.scrollHeight; 

          snapshot.docChanges().forEach((change) => {
              if (change.type === "added" && !isInitialLoad) {
                  const newMsg = change.doc.data();
                  if (newMsg.uid !== currentUser.uid) {
                      document.getElementById('notify-sound').play().catch(e => console.log(e));
                      // In-app visual notification fallback jodi background theke na ashe
                      if (Notification.permission === "granted" && document.visibilityState !== "visible") {
                          new Notification(extractUsername(newMsg.senderEmail), {
                              body: newMsg.text,
                              icon: "https://cdn-icons-png.flaticon.com/512/1864/1864509.png"
                          });
                      }
                  }
              }
          });
          isInitialLoad = false;
      });
  }

  // Visual Viewport Fix
  if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
          document.body.style.height = window.visualViewport.height + 'px';
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
  }

  document.getElementById('send-btn').addEventListener('click', async () => {
      const text = msgInput.value.trim();
      if(text !== "") {
          msgInput.value = ''; 
          setTimeout(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; }, 10);
          try {
              await addDoc(collection(db, "chats"), {
                  uid: currentUser.uid,
                  senderEmail: currentUser.email,
                  text: text,
                  timestamp: serverTimestamp(),
                  seen: false,
                  seenBy: ""
              });
          } catch(error) {
              console.error(error);
          }
      }
      msgInput.focus(); 
  });

  msgInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') { document.getElementById('send-btn').click(); }
  });

  // Service Worker Registration for Background Tasks
  if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
      .then(function(registration) {
          console.log('Registration successful, scope is:', registration.scope);
      }).catch(function(err) {
          console.log('Service worker registration failed, error:', err);
      });
  }
</script>
</body>
  </html>
